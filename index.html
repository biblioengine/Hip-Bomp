<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0e0c08">
<title>Hip-Bomp | 匹夫凡夫</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Antique+Soft&family=Shippori+Mincho+B1:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:#0e0c08;color:#f0e8d0;font-family:'Shippori Mincho B1',serif;
  display:flex;flex-direction:column;align-items:center;
  user-select:none;max-width:480px;margin:0 auto;height:100dvh;}
.hero{width:100%;height:78px;overflow:hidden;position:relative;flex-shrink:0;background:#0e0c08;}
.hero-logo{display:flex;align-items:center;padding:5px 12px;height:100%;gap:10px;}
.enso-logo{height:62px;width:62px;object-fit:contain;flex-shrink:0;}
.hero-title{display:flex;flex-direction:column;justify-content:center;gap:2px;}
.hero-main{font-family:'Arial Black','Franklin Gothic Heavy',Impact,sans-serif;font-size:1.55rem;font-weight:900;color:#f5f0e8;letter-spacing:-0.02em;line-height:1;}
.hero-sub{font-size:0.5rem;color:#c8a050;letter-spacing:0.35em;}
.tabs{display:flex;width:100%;flex-shrink:0;border-bottom:1px solid #2a1e10;}
.tab{flex:1;padding:7px 0;text-align:center;font-size:0.65rem;letter-spacing:0.3em;color:#4a3a28;cursor:pointer;transition:all 0.2s;border-bottom:2px solid transparent;font-family:'Zen Antique Soft',serif;}
.tab.active{color:#c8a050;border-bottom-color:#c8a050;}
.output{width:100%;background:#16120a;border-bottom:1px solid #2a1e10;padding:10px 14px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;min-height:110px;position:relative;overflow:hidden;}
.vj-img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;opacity:0;transition:opacity 0.3s;pointer-events:none;}
.vj-img.show{opacity:1;}
.out-word{font-family:'Zen Antique Soft',serif;font-size:2.2rem;letter-spacing:0.25em;transition:color 0.15s;text-align:center;line-height:1.3;}
.out-hint{font-size:0.52rem;color:#4a3a28;margin-top:6px;letter-spacing:0.3em;}
/* SAMPLER */
#samplerView{flex:1;overflow:hidden;width:100%;display:flex;flex-direction:column;align-items:center;padding:6px 10px 8px;}
.sampler-body{display:flex;width:100%;flex:1;align-items:stretch;gap:0;min-height:0;}
.pages{display:flex;flex-direction:column;gap:4px;flex-shrink:0;padding:0 5px 0 0;align-self:stretch;}
.pb{width:28px;min-width:28px;flex:1;background:#16120a;border:1px solid #2a1e10;border-radius:3px;color:#4a3a28;font-size:0.75rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;font-family:'Zen Antique Soft',serif;touch-action:manipulation;}
.pb.active{background:#c8a050;color:#0e0c08;border-color:#c8a050;font-weight:bold;}
.pad-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;flex:1;min-width:0;}
.pad{aspect-ratio:1;background:#16120a;border:1.5px solid #2a2010;border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:none;transition:background 0.07s,transform 0.07s;padding:3px;min-width:0;position:relative;overflow:hidden;}
.pad.fired{background:#4a3010;transform:scale(0.91);border-color:#c8a050;}
.pad-name{font-size:0.5rem;color:#c8a050;text-align:center;line-height:1.35;letter-spacing:0.03em;}
.fg{position:absolute;color:rgba(200,160,80,0.5);line-height:1;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:1px;}
.fg .arr{font-size:1.4rem;}
.fg .lbl{font-size:0.9rem;font-family:'Zen Antique Soft',serif;}
.fg-top{top:2px;left:50%;transform:translateX(-50%);}
.fg-bottom{bottom:2px;left:50%;transform:translateX(-50%);}
.fg-left{left:2px;top:50%;transform:translateY(-50%);}
.fg-right{right:2px;top:50%;transform:translateY(-50%);}
.fg-tl{top:2px;left:2px;}
.fg-tr{top:2px;right:2px;align-items:flex-end;}
.fg-bl{bottom:2px;left:2px;}
.fg-br{bottom:2px;right:2px;align-items:flex-end;}
/* DJ */
#djView{flex:1;width:100%;display:none;flex-direction:column;align-items:center;overflow:hidden;position:relative;}
.dj-bg{position:absolute;inset:0;z-index:0;}
.dj-bg img{width:100%;height:100%;object-fit:cover;opacity:0.1;}
.dj-content{position:relative;z-index:1;width:100%;height:100%;display:flex;flex-direction:column;padding:8px 10px 8px;}
.turntables{display:flex;justify-content:space-between;margin-bottom:6px;}
.deck{display:flex;flex-direction:column;align-items:center;gap:3px;width:48%;}
.deck-label{font-size:0.55rem;color:#c8a050;letter-spacing:0.4em;font-family:'Zen Antique Soft',serif;}
.deck canvas{width:100%;aspect-ratio:1;display:block;border-radius:50%;touch-action:none;}
.deck-bpm{font-size:0.42rem;color:#4a3a28;letter-spacing:0.2em;}
.fader-section{margin-bottom:6px;}
.fader-labels{display:flex;justify-content:space-between;margin-bottom:3px;}
.fader-lbl{font-size:0.48rem;color:#c8a050;letter-spacing:0.3em;transition:opacity 0.2s;}
.fader-wrap{position:relative;height:24px;display:flex;align-items:center;}
.fader-track{width:100%;height:2px;background:#2a1e10;border-radius:2px;}
input[type=range]#crossfader{position:absolute;width:100%;opacity:0;height:24px;cursor:pointer;z-index:2;}
.fader-knob{position:absolute;width:16px;height:24px;background:#c8a050;border-radius:2px;top:50%;transform:translate(-50%,-50%);left:50%;box-shadow:0 0 8px rgba(200,160,80,0.4);pointer-events:none;z-index:1;}
.dj-bgm-btn{width:100%;background:#16120a;border:1px solid #c8a050;color:#c8a050;font-size:0.63rem;letter-spacing:0.3em;padding:7px;cursor:pointer;border-radius:2px;font-family:'Shippori Mincho B1',serif;transition:all 0.15s;touch-action:manipulation;margin-bottom:6px;}
.dj-bgm-btn.playing{background:#c8a050;color:#0e0c08;}
.dj-genre-panel{display:flex;gap:6px;width:100%;margin-bottom:6px;}
.dj-genre-col{flex:1;display:flex;flex-direction:column;gap:4px;}
.dj-genre-head{font-size:0.5rem;color:#c8a050;letter-spacing:0.4em;text-align:center;padding:2px 0;border-bottom:1px solid #2a1e10;margin-bottom:2px;font-family:'Zen Antique Soft',serif;}
.loop-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;}
.lbtn{background:#16120a;border:1px solid #2a2010;color:#c8a050;font-size:0.85rem;padding:5px 0;cursor:pointer;font-family:'Zen Antique Soft',serif;text-align:center;touch-action:manipulation;display:block;width:100%;border-radius:3px;transition:all 0.15s;}
.lbtn.on{box-shadow:0 0 0 2px #c8a050,0 0 8px #c8a05088;background:#3a2e10;}

</style>
</head>
<body>
<div class="hero"><div class="hero-logo"><img class="enso-logo" src="hip-bomp-logo.svg" alt="Hip-Bomp"><div class="hero-title"><span class="hero-main">Hip-Bomp</span><span class="hero-sub">匹夫凡夫</span></div></div></div>
<div class="tabs"><div class="tab active" id="tabSampler" onclick="setMode('sampler')">言霊</div><div class="tab" id="tabDJ" onclick="setMode('dj')">漆盆</div></div>
<div class="output"><img class="vj-img" id="vjImg" src="" alt=""><div class="out-word" id="outWord">――</div><div class="out-hint" id="outHint">tap or flick</div></div>
<div id="samplerView" style="display:flex">
<div class="sampler-body"><div class="pages" id="pageButtons"></div><div class="pad-grid" id="padGrid"></div></div>
</div>
<div id="djView">
<div class="dj-bg"><img src="hip-bomp-logo.svg" alt=""></div>
<div class="dj-content">
<div class="turntables"><div class="deck"><div class="deck-label">漆盆「阿」</div><canvas id="recordA" width="130" height="130"></canvas></div><div class="deck"><div class="deck-label">漆盆「吽」</div><canvas id="recordB" width="130" height="130"></canvas></div></div>
<div class="fader-section"><div class="fader-labels"><span class="fader-lbl" id="flblA">甲</span><span class="fader-lbl" id="flblB">乙</span></div><div class="fader-wrap"><div class="fader-track"></div><div class="fader-knob" id="faderKnob"></div><input type="range" id="crossfader" min="0" max="1" step="0.01" value="0.5"></div></div>
<button class="dj-bgm-btn" id="djBgmBtn" onclick="toggleDJBGM()">お囃子を鳴らす</button>
<div class="dj-genre-panel"><div class="dj-genre-col"><div class="dj-genre-head">甲</div><div class="loop-grid" id="loopA"></div></div><div class="dj-genre-col"><div class="dj-genre-head">乙</div><div class="loop-grid" id="loopB"></div></div></div>
</div>
</div>
<script>
const PAGES = [
  [{key:'yabodegozaimasu',name:'野暮でございます'},{key:'nanto',name:'なんと'},{key:'wabi',name:'侘び'},
   {key:'sabi',name:'寂び'},{key:'omomukibukai',name:'趣き深い'},{key:'zokubutu',name:'俗物'},
   {key:'daga',name:'だが'},{key:'yeah',name:'yeah'},{key:'tensai',name:'天才'}],
  [{key:'migoto',name:'見事'},{key:'kalma',name:'業'},{key:'wabisabi',name:'侘び寂び'},
   {key:'dorokusai',name:'泥臭い'},{key:'hiphop',name:'Hip Hop'},{key:'yoidesuka',name:'よいですか'},
   {key:'akindonosoroban',name:'商人のそろばん'},{key:'ippon',name:'一本'},{key:'nippon',name:'日本'}],
  [{key:'keepon',name:'Keep On'},{key:'kyakkashouko',name:'脚下照顧'},{key:'yunomi',name:'湯呑み'},
   {key:'hedogaderu',name:'反吐が出る'},{key:'onore',name:'おのれ'},{key:'oroka',name:'愚か'},
   {key:'hinsou',name:'貧相'},{key:'anchoku',name:'安直'},{key:'asamasii',name:'浅ましい'}],
  [{key:'kekkounaotemae',name:'結構なお手前'},{key:'sorekosoga',name:'それこそが'},{key:'yokubou',name:'欲望'},
   {key:'kyouki',name:'狂気'},{key:'bigaku',name:'美学'},{key:'zen',name:'禅'},
   {key:'sikantaza',name:'只管打坐'},{key:'towa',name:'とは'},{key:'sono',name:'その'}],
  [{key:'chajin',name:'茶人'},{key:'chasitu',name:'茶室'},{key:'sennorikyuu',name:'千利休'},
   {key:'kazuchawan',name:'楽茶碗'},{key:'konpeitou',name:'金平糖'},{key:'kiden',name:'貴殿'},
   {key:'marude',name:'まるで'},{key:'tugihagi',name:'継ぎ接ぎ'},{key:'mu',name:'無'}],
  [{key:'jituni',name:'実に'},{key:'jituniyoi',name:'実によい'},{key:'desune',name:'ですね'},
   {key:'gozaimasu',name:'ございます'},{key:'nanodesu',name:'なのです'},{key:'sorekosoga',name:'それこそが'},
   {key:'yeah',name:'yeah'},{key:'migoto',name:'見事'},{key:'wabi',name:'侘び'}],
  [{key:'yokubou',name:'欲望'},{key:'kyouki',name:'狂気'},{key:'kekkounaotemae',name:'結構なお手前'},
   {key:'wabisabi',name:'侘び寂び'},{key:'oroka',name:'愚か'},{key:'hinsou',name:'貧相'},
   {key:'zokubutu',name:'俗物'},{key:'tensai',name:'天才'},{key:'yeah',name:'yeah'}]
];
const PAGE_LABELS = ['い','ろ','は','に','ほ','へ','と'];
const JOSHI = [
  {key:'wa',label:'は'},{key:'ga',label:'が'},{key:'no',label:'の'},{key:'to',label:'と'},
  {key:'mo',label:'も'},{key:'wo',label:'を'},{key:'ni',label:'に'},{key:'de',label:'で'}
];
const LOOP_LABELS = ['一','二','三','四','五','六'];
const LOOP_FILES = ['bgm/loop1.mp3','bgm/loop2.mp3','bgm/loop3.mp3','bgm/loop4.mp3','bgm/loop5.mp3','bgm/loop6.mp3'];


var actx=null, bufCache={};
function getCtx(){ if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)(); return actx; }
function getBuffer(key){
  if(bufCache[key]) return Promise.resolve(bufCache[key]);
  return fetch('audio/'+key+'.mp3').then(function(r){return r.arrayBuffer();})
    .then(function(ab){return getCtx().decodeAudioData(ab);})
    .then(function(b){bufCache[key]=b;return b;});
}
function playKey(key){
  var ctx=getCtx(); if(ctx.state==='suspended') ctx.resume();
  return getBuffer(key).then(function(buf){
    var src=ctx.createBufferSource(); src.buffer=buf; src.connect(ctx.destination); src.start(0); return buf.duration;
  });
}
function preload(){ ['wa','ga','no','to','mo','wo','ni','de'].forEach(function(k){getBuffer(k).catch(function(){});}); }

var tx=0,ty=0,tKey='',tName='',THRESH=28,DIAG=0.41;
function getDir(dx,dy){
  var ax=Math.abs(dx),ay=Math.abs(dy);
  if(ax<THRESH&&ay<THRESH) return 'none';
  var r=ay===0?999:ax/ay;
  if(r>(1/DIAG)) return dx>0?'right':'left';
  if(r<DIAG)     return dy>0?'down':'up';
  if(dx>0&&dy<0) return 'upright'; if(dx<0&&dy<0) return 'upleft';
  if(dx>0&&dy>0) return 'downright'; return 'downleft';
}
var DIR_MAP={up:{key:'wa',label:'は'},down:{key:'ga',label:'が'},left:{key:'no',label:'の'},right:{key:'to',label:'と'},
  upleft:{key:'mo',label:'も'},upright:{key:'wo',label:'を'},downleft:{key:'ni',label:'に'},downright:{key:'de',label:'で'}};

function showWord(t,key){
  var ow=document.getElementById('outWord'); ow.textContent=t; ow.style.color='#fff';
  setTimeout(function(){ow.style.color='';},200);
  if(key){
    var img=document.getElementById('vjImg');
    img.src='images/'+key+'.png';
    img.classList.add('show');
    img.onerror=function(){img.classList.remove('show');};
  }
}

function fireWord(key,name){
  playKey(key);
  showWord(name,key);
  document.getElementById('outHint').textContent='...';
}
function fireJoshi(dir,name){
  if(dir!=='none'&&DIR_MAP[dir]){
    var label=DIR_MAP[dir].label;
    playKey(DIR_MAP[dir].key);
    showWord(name+label,tKey);
    document.getElementById('outHint').textContent='〜'+label;
  }
}

function bindPad(el,pad){
  el.addEventListener('touchstart',function(e){
    e.preventDefault();
    tx=e.touches[0].clientX;ty=e.touches[0].clientY;
    tKey=pad.key;tName=pad.name;
    el.classList.add('fired');
    fireWord(pad.key,pad.name);
  },{passive:false});
  el.addEventListener('touchend',function(e){
    e.preventDefault();el.classList.remove('fired');
    var t=e.changedTouches[0];
    fireJoshi(getDir(t.clientX-tx,t.clientY-ty),tName);
  },{passive:false});
  el.addEventListener('mousedown',function(e){
    tx=e.clientX;ty=e.clientY;tKey=pad.key;tName=pad.name;
    el.classList.add('fired');
    fireWord(pad.key,pad.name);
  });
  el.addEventListener('mouseup',function(e){
    el.classList.remove('fired');
    fireJoshi(getDir(e.clientX-tx,e.clientY-ty),tName);
  });
}

var curPage=0;
function setPage(p){
  curPage=p;
  document.querySelectorAll('.pb').forEach(function(b,i){b.classList.toggle('active',i===p);});
  renderPads();
  var next=PAGES[(p+1)%PAGES.length]; next.forEach(function(pad){getBuffer(pad.key).catch(function(){});});
}

var GUIDES=[
  {cls:'fg fg-tl',arrow:'↖',label:'も'},
  {cls:'fg fg-top',arrow:'↑',label:'は'},
  {cls:'fg fg-tr',arrow:'↗',label:'を'},
  {cls:'fg fg-left',arrow:'←',label:'の'},
  null,
  {cls:'fg fg-right',arrow:'→',label:'と'},
  {cls:'fg fg-bl',arrow:'↙',label:'に'},
  {cls:'fg fg-bottom',arrow:'↓',label:'が'},
  {cls:'fg fg-br',arrow:'↘',label:'で'}
];

function renderPads(){
  var grid=document.getElementById('padGrid'); grid.innerHTML='';
  PAGES[curPage].forEach(function(pad,i){
    var el=document.createElement('div'); el.className='pad';
    // 木札背景画像
    el.style.backgroundImage="url('pads/"+pad.key+".png')";
    el.style.backgroundSize='cover';
    el.style.backgroundPosition='center';
    var g=GUIDES[i];
    if(g){
      var gd=document.createElement('span'); gd.className=g.cls;
      gd.innerHTML='<span class="arr">'+g.arrow+'</span><span class="lbl">'+g.label+'</span>';
      el.appendChild(gd);
    }
    var nm=document.createElement('span'); nm.className='pad-name'; nm.textContent=pad.name;
    el.appendChild(nm); bindPad(el,pad); grid.appendChild(el);
  });
}

// ループ音源
var loopState={A:{idx:null,audio:null},B:{idx:null,audio:null}};
var faderVal=0.5;

function updateFader(){
  var volA=Math.cos(faderVal*Math.PI/2)*0.85;
  var volB=Math.sin(faderVal*Math.PI/2)*0.85;
  if(loopState.A.audio) loopState.A.audio.volume=volA;
  if(loopState.B.audio) loopState.B.audio.volume=volB;
}

function selectLoop(side,idx){
  var st=loopState[side];
  // 同じボタンで停止
  if(st.idx===idx){
    if(st.audio){st.audio.pause();st.audio.currentTime=0;st.audio=null;}
    st.idx=null;
    document.querySelectorAll('.lbtn-'+side).forEach(function(b){b.classList.remove('on');});
    return;
  }
  // 既存停止
  if(st.audio){st.audio.pause();st.audio=null;}
  st.idx=idx;
  document.querySelectorAll('.lbtn-'+side).forEach(function(b,i){b.classList.toggle('on',i===idx);});
  // 常に再生（ユーザー操作起点なのでAutoplay許可される）
  playLoop(side);
  // お囃子ボタンをON状態に見せる
  var btn=document.getElementById('djBgmBtn');
  if(loopState.A.audio||loopState.B.audio){
    btn.classList.add('playing');
    btn.textContent='お囃子を止める';
  }
}

function playLoop(side){
  var st=loopState[side];
  if(st.idx===null) return;
  if(st.audio){st.audio.pause();st.audio=null;}
  var a=new Audio(LOOP_FILES[st.idx]);
  a.loop=true;
  a.volume=side==='A'?Math.cos(faderVal*Math.PI/2)*0.85:Math.sin(faderVal*Math.PI/2)*0.85;
  a.play().catch(function(){});
  st.audio=a;
}

function stopLoop(side){
  var st=loopState[side];
  if(st.audio){st.audio.pause();st.audio.currentTime=0;st.audio=null;}
}

function toggleDJBGM(){
  var btn=document.getElementById('djBgmBtn');
  var playing=btn.classList.contains('playing');
  if(playing){
    stopLoop('A');stopLoop('B');
    btn.classList.remove('playing');
    btn.textContent='お囃子を鳴らす';
  } else {
    // 選択中のループがあれば再生
    playLoop('A');playLoop('B');
    if(loopState.A.audio||loopState.B.audio){
      btn.classList.add('playing');
      btn.textContent='お囃子を止める';
    }
  }
}

// ターンテーブル
var decks=[
  {el:null,angle:0,lastAngle:0,spinning:false,cx:0,cy:0},
  {el:null,angle:0,lastAngle:0,spinning:false,cx:0,cy:0}
];
function getAngle(cx,cy,px,py){return Math.atan2(py-cy,px-cx)*180/Math.PI;}
function drawRecord(dk,label){
  var c=dk.el; if(!c) return;
  var w=c.width,h=c.height,cx=w/2,cy=h/2,r=w/2-3;
  var ctx2=c.getContext('2d'); ctx2.clearRect(0,0,w,h);
  var grd=ctx2.createRadialGradient(cx,cy,r*0.5,cx,cy,r);
  grd.addColorStop(0,'#1e1810'); grd.addColorStop(1,'#0e0c08');
  ctx2.beginPath(); ctx2.arc(cx,cy,r,0,Math.PI*2); ctx2.fillStyle=grd; ctx2.fill();
  ctx2.save(); ctx2.translate(cx,cy); ctx2.rotate(dk.angle*Math.PI/180);
  for(var i=8;i<r-4;i+=4){ctx2.beginPath();ctx2.arc(0,0,i,0,Math.PI*2);ctx2.strokeStyle='rgba(200,160,80,'+(0.03+0.015*(i%2))+')';ctx2.lineWidth=1;ctx2.stroke();}
  var lg=ctx2.createRadialGradient(0,0,0,0,0,r*0.33); lg.addColorStop(0,'#c8a050'); lg.addColorStop(1,'#7a5020');
  ctx2.beginPath(); ctx2.arc(0,0,r*0.33,0,Math.PI*2); ctx2.fillStyle=lg; ctx2.fill();
  ctx2.fillStyle='#0e0c08'; ctx2.font='bold '+(r*0.17)+'px serif'; ctx2.textAlign='center'; ctx2.textBaseline='middle'; ctx2.fillText(label||'RE:Q',0,0);
  ctx2.beginPath(); ctx2.arc(0,0,3,0,Math.PI*2); ctx2.fillStyle='#f0e8d0'; ctx2.fill();
  ctx2.restore();
  ctx2.beginPath(); ctx2.arc(cx,cy,r,0,Math.PI*2); ctx2.strokeStyle='rgba(200,160,80,0.25)'; ctx2.lineWidth=1.5; ctx2.stroke();
}
function bindTurntable(dk,id,label){
  var c=document.getElementById(id); dk.el=c; drawRecord(dk,label);
  function onStart(px,py){var r=c.getBoundingClientRect();dk.cx=r.left+r.width/2;dk.cy=r.top+r.height/2;dk.lastAngle=getAngle(dk.cx,dk.cy,px,py);dk.spinning=true;}
  function onMove(px,py){
    if(!dk.spinning) return;
    var a=getAngle(dk.cx,dk.cy,px,py);
    var da=a-dk.lastAngle; if(da>180) da-=360; if(da<-180) da+=360;
    dk.angle+=da; dk.lastAngle=a; drawRecord(dk,label);
    var speed=Math.abs(da);
    if(speed>1.5){
      var ctx=getCtx(); if(ctx.state==='suspended') ctx.resume();
      var dur=0.04;
      var buf=ctx.createBuffer(1,Math.floor(ctx.sampleRate*dur),ctx.sampleRate);
      var d=buf.getChannelData(0);
      for(var i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.min(speed/20,1);
      var src=ctx.createBufferSource(); src.buffer=buf;
      var bpf=ctx.createBiquadFilter(); bpf.type='bandpass';
      bpf.frequency.value=800+speed*80; bpf.Q.value=2;
      var gn=ctx.createGain(); gn.gain.value=Math.min(speed/15,0.5);
      src.connect(bpf); bpf.connect(gn); gn.connect(ctx.destination);
      src.start(0); src.stop(ctx.currentTime+dur+0.01);
    }
  }
  function onEnd(){dk.spinning=false;}
  c.addEventListener('touchstart',function(e){e.preventDefault();var t=e.touches[0];onStart(t.clientX,t.clientY);},{passive:false});
  c.addEventListener('touchmove', function(e){e.preventDefault();var t=e.touches[0];onMove(t.clientX,t.clientY);},{passive:false});
  c.addEventListener('touchend',  function(e){e.preventDefault();onEnd();},{passive:false});
  c.addEventListener('mousedown', function(e){onStart(e.clientX,e.clientY);});
  c.addEventListener('mousemove', function(e){onMove(e.clientX,e.clientY);});
  c.addEventListener('mouseup',   function(e){onEnd();});
  c.addEventListener('mouseleave',function(e){onEnd();});
}

function initFader(){
  var fd=document.getElementById('crossfader');
  fd.addEventListener('input',function(){
    faderVal=parseFloat(fd.value); updateFader();
    document.getElementById('faderKnob').style.left=(faderVal*100)+'%';
    document.getElementById('flblA').style.opacity=1-faderVal*0.7;
    document.getElementById('flblB').style.opacity=0.3+faderVal*0.7;
  });
}

function initDJGenres(){
  ['A','B'].forEach(function(side){
    var grid=document.getElementById('loop'+side);
    LOOP_LABELS.forEach(function(lbl,i){
      var btn=document.createElement('button');
      btn.className='lbtn lbtn-'+side;
      btn.textContent=lbl;
      (function(idx){
        btn.addEventListener('click',function(){selectLoop(side,idx);});
        btn.addEventListener('touchstart',function(e){e.preventDefault();},{passive:false});
        btn.addEventListener('touchend',function(e){e.preventDefault();selectLoop(side,idx);},{passive:false});
      })(i);
      grid.appendChild(btn);
    });
  });
}

function setMode(mode){
  document.getElementById('samplerView').style.display=mode==='sampler'?'flex':'none';
  document.getElementById('djView').style.display=mode==='dj'?'flex':'none';
  document.getElementById('tabSampler').classList.toggle('active',mode==='sampler');
  document.getElementById('tabDJ').classList.toggle('active',mode==='dj');
  if(mode==='dj'){drawRecord(decks[0],'阿');drawRecord(decks[1],'吽');}
}

renderPads(); initFader(); initDJGenres();
bindTurntable(decks[0],'recordA','阿');
bindTurntable(decks[1],'recordB','吽');
setMode('sampler'); preload();

(function(){
  var wrap=document.getElementById('pageButtons');
  var pbKeys=['i','ro','ha','ni','ho','he','to'];
  PAGE_LABELS.forEach(function(lbl,i){
    var btn=document.createElement('button');
    btn.className='pb'+(i===0?' active':'');
    btn.style.backgroundImage="url('pads/pb_"+pbKeys[i]+".png')";
    btn.style.backgroundSize='cover';
    btn.style.backgroundPosition='center';
    btn.textContent='';  // 画像があるのでテキスト不要（フォールバック用に空）
    // 画像なければテキスト表示
    var img=new Image();
    img.onerror=function(){btn.textContent=lbl;};
    img.src='pads/pb_'+pbKeys[i]+'.png';
    btn.addEventListener('click',function(){setPage(i);});
    btn.addEventListener('touchstart',function(e){e.preventDefault();},{passive:false});
    btn.addEventListener('touchend',function(e){e.preventDefault();setPage(i);},{passive:false});
    wrap.appendChild(btn);
  });
})();

</script>
